<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planejador Inteligente</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✅</text></svg>">
    <style>
        :root {
            --bg-color: #f4f5f7; --container-bg: #ffffff; --text-color: #333333;
            --primary-color: #0052cc; --primary-hover: #0043a6; --border-color: #dfe1e6;
        }

        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 10px; display: flex; justify-content: center; }
        .container { background-color: var(--container-bg); max-width: 600px; width: 100%; padding: 15px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); box-sizing: border-box; }
        h1 { font-size: 20px; margin-top: 0; margin-bottom: 15px; text-align: center; }
        label { display: block; font-weight: 600; margin-bottom: 5px; font-size: 14px; }
        
        .label-row { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 5px; }
        .label-row label { margin-bottom: 0; }
        .btn-limpar { background: none; border: none; color: #de350b; font-size: 13px; font-weight: 600; cursor: pointer; padding: 0; margin: 0; width: auto; flex: none; transition: 0.2s; }
        .btn-limpar:hover { opacity: 0.7; }

        input[type="time"], input[type="text"], input[type="number"], textarea, select {
            width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid var(--border-color);
            border-radius: 5px; font-size: 16px; box-sizing: border-box; font-family: inherit;
        }
        
        textarea { 
            resize: vertical; 
            min-height: 160px; 
            margin-bottom: 10px; 
            border: 2px solid #b3d4ff; 
            background-color: #fafbfc; 
            box-shadow: inset 0 2px 4px rgba(0, 82, 204, 0.05); 
        }
        textarea:focus {
            border-color: var(--primary-color);
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(0, 82, 204, 0.25);
            outline: none;
        }

        button { padding: 12px; border: none; border-radius: 5px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background-color 0.2s; box-sizing: border-box; }
        .btn-full { width: 100%; display: block; margin-bottom: 15px; }
        
        .btn-voz { background-color: #ff5630; color: white; }
        .btn-voz:hover { background-color: #de350b; }
        .btn-voz.ouvindo { background-color: #36b37e; }
        .btn-calcular { background-color: var(--primary-color); color: white; margin-bottom: 20px; }
        .btn-calcular:hover { background-color: var(--primary-hover); }

        /* BIBLIOTECA DE TAREFAS */
        .biblioteca-details {
            background-color: #f9fafc; border: 1px solid var(--border-color);
            padding: 12px; border-radius: 8px; margin-bottom: 15px; transition: all 0.3s;
        }
        .biblioteca-summary {
            font-size: 14px; font-weight: 600; color: #0052cc; cursor: pointer; list-style: none; outline: none;
            display: flex; justify-content: space-between; align-items: center;
        }
        .biblioteca-summary::-webkit-details-marker { display: none; }
        .biblioteca-summary::after { content: '▼'; font-size: 12px; }
        details[open] .biblioteca-summary::after { content: '▲'; }
        
        .biblioteca-controls { display: flex; gap: 8px; margin-top: 15px; margin-bottom: 10px; }
        #select-categoria { margin-bottom: 0; padding: 8px; font-size: 14px; flex: 1; }
        .btn-nova-cat { background-color: #00875a; color: white; padding: 8px 12px; border: none; border-radius: 5px; font-size: 13px; font-weight: 600; cursor: pointer; flex: none; }

        .historico-lista { display: flex; flex-direction: column; gap: 4px; margin-top: 10px; }
        .tarefa-chip { 
            background-color: #e6efff; color: #0052cc; border: 1px solid #b3d4ff; 
            border-radius: 5px; padding: 4px 8px; 
            cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: space-between;
            width: 100%; box-sizing: border-box;
        }
        .tarefa-chip:hover { background-color: #d1e2ff; }
        .tarefa-chip span { flex: 1; text-align: left; font-weight: 500; font-size: 12px; line-height: 1.2; }
        .btn-del-chip { 
            background: none; border: none; cursor: pointer; color: #0052cc; opacity: 0.5; transition: 0.2s; border-radius: 3px;
            flex: none; width: auto; padding: 2px 6px; font-size: 10px; 
        }
        .btn-del-chip:hover { opacity: 1; color: white; background-color: #de350b; }

        .rotinas-section { background-color: #f9fafc; border: 1px solid var(--border-color); padding: 12px; border-radius: 8px; margin-bottom: 15px; }
        .rotinas-header { font-size: 14px; font-weight: 600; margin-bottom: 10px; color: #42526e; }
        .rotina-salvar-box { display: flex; gap: 8px; margin-bottom: 10px; }
        .btn-salvar-rotina { background-color: #00875a; color: white; padding: 10px; width: auto; flex: none; font-size: 14px;}
        .rotinas-lista { display: flex; flex-direction: column; gap: 6px; }
        .rotina-pill { background-color: white; border: 1px solid var(--border-color); border-radius: 6px; padding: 8px 12px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .btn-carregar-rotina { background: none; border: none; padding: 0; cursor: pointer; font-weight: 600; color: var(--primary-color); font-size: 14px; flex: 1; text-align: left; }
        .btn-del-rotina { background: none; border: none; padding: 4px 8px; cursor: pointer; color: #de350b; font-size: 12px; margin-left: 8px; opacity: 0.7; border-radius: 4px; flex: none; width: auto; }
        .btn-del-rotina:hover { opacity: 1; background-color: #ffebe6; }

        .timer-container { background-color: #e3fcef; border: 2px solid #36b37e; padding: 15px; border-radius: 8px; text-align: center; margin-bottom: 15px; display: none; transition: 0.3s; }
        .timer-task-name { font-size: 24px; margin-bottom: 8px; color: #000000; font-weight: 900; }
        .timer-display { font-size: 46px; font-weight: bold; color: #006644; font-variant-numeric: tabular-nums; margin: 10px 0 5px 0; }
        .timer-fim-estimado { font-size: 18px; font-weight: 600; color: #00875a; margin-bottom: 15px; }
        .timer-buttons { display: flex; gap: 10px; }
        .btn-pausar { flex: 1; background-color: #ff991f; color: white; }
        .btn-concluir { flex: 1; background-color: #36b37e; color: white; }

        .timer-atraso { background-color: #ffebe6; border-color: #de350b; }
        .timer-atraso .timer-display { color: #de350b; }
        .timer-atraso .timer-fim-estimado { color: #bf2600; }

        .resumo-topo { padding: 12px 15px; background-color: #f4f5f7; border-radius: 5px; border-left: 4px solid var(--primary-color); margin-bottom: 15px; display: none; }
        .resumo-topo p { margin: 8px 0; font-size: 15px; display: flex; justify-content: space-between; align-items: center; }
        .valor-visual { font-size: 18px; font-weight: bold; padding: 4px 10px; border-radius: 6px; }
        .val-tempo { background-color: #e6efff; color: #0052cc; }
        .val-fim { background-color: #ffebe6; color: #de350b; }

        .table-wrapper { width: 100%; overflow-x: auto; margin-bottom: 20px; border-radius: 5px; }
        table { width: 100%; border-collapse: collapse; min-width: 380px; font-size: 13px; }
        th, td { padding: 8px 5px; text-align: left; border-bottom: 1px solid var(--border-color); }
        th { background-color: var(--bg-color); font-weight: 600; }
        .btn-acao { background: none; border: none; cursor: pointer; font-size: 16px; padding: 2px; border-radius: 4px; flex: none; width: auto; }
        .acoes-col { white-space: nowrap; width: 90px; }

        .trofeu-container {
            text-align: center; padding: 30px 15px; background: #fffcf0; border: 2px solid #ffab00; 
            border-radius: 8px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); animation: fade-in 0.5s;
        }
        @keyframes fade-in { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .concluidas-section { background-color: #eafbee; border: 1px solid #36b37e; padding: 12px; border-radius: 8px; margin-bottom: 20px; display: none; }
        .concluidas-header { font-size: 14px; font-weight: 600; margin-bottom: 10px; color: #006644; display: flex; align-items: center; gap: 5px; }
        .concluidas-lista { list-style: none; padding: 0; margin: 0 0 10px 0; }
        .concluidas-lista li { font-size: 13px; margin-bottom: 6px; color: #00875a; display: flex; justify-content: space-between; border-bottom: 1px dashed #abf5d1; padding-bottom: 4px; }
        .concluidas-lista li span.nome-ok { font-weight: 500; }
        .concluidas-lista li span.tempo-ok { font-weight: bold; }
        .concluidas-resumo { font-weight: bold; color: #006644; font-size: 15px; text-align: right; padding-top: 5px; border-top: 2px solid #abf5d1; margin-top: 5px; }
        .btn-limpar-concluidas { background: none; border: none; color: #006644; font-size: 11px; cursor: pointer; text-decoration: underline; padding: 0; width: 100%; text-align: center; margin-top: 10px; opacity: 0.7; }
    </style>
</head>
<body>

<div class="container">
    <h1>✅ Planejador Inteligente</h1>
    
    <label>Horário de Início:</label>
    <input type="time" id="hora-inicio">

    <div class="label-row">
        <label>Tarefas a Fazer:</label>
        <button id="btn-limpar-texto" class="btn-limpar">🗑️ Apagar tudo</button>
    </div>
    <textarea id="txt-entrada" placeholder="Fale ou digite as tarefas, separando com vírgulas. Você pode falar ou escrever a tarefa e dizer o tempo. Ex: 'Varrer sala 8, '. A tarefa será adicionada com 8 minutos automaticamente."></textarea>

    <button id="btn-voz" class="btn-voz btn-full">🎤 Falar Tarefa</button>

    <details class="biblioteca-details">
        <summary class="biblioteca-summary">⚡ Biblioteca de Tarefas</summary>
        <div class="biblioteca-controls">
            <select id="select-categoria"></select>
            <button id="btn-nova-categoria" class="btn-nova-cat" title="Criar nova lista">➕ Nova Lista</button>
        </div>
        <div id="container-historico" class="historico-lista"></div>
    </details>

    <div class="rotinas-section">
        <div class="rotinas-header">📂 Minhas Listas Salvas</div>
        <div class="rotina-salvar-box">
            <input type="text" id="nome-rotina" placeholder="Nome (Ex: Fim de semana)" style="margin:0;">
            <button id="btn-salvar-rotina" class="btn-salvar-rotina">Salvar</button>
        </div>
        <div id="container-rotinas" class="rotinas-lista"></div>
    </div>

    <button id="btn-calcular" class="btn-calcular btn-full">Calcular Tempo das Tarefas</button>

    <div id="resumo-topo" class="resumo-topo"></div>

    <div id="painel-timer" class="timer-container">
        <div id="timer-nome" class="timer-task-name">Tarefa</div>
        <div id="timer-relogio" class="timer-display">00:00</div>
        <div id="timer-fim-estimado" class="timer-fim-estimado">🎯 Término previsto: 00:00</div>
        <div class="timer-buttons">
            <button id="btn-pausar" class="btn-pausar">⏸️ Pausar</button>
            <button id="btn-concluir" class="btn-concluir">✅ Concluir</button>
        </div>
    </div>

    <div class="table-wrapper">
        <div id="resultado"></div>
    </div>

    <div id="painel-concluidas" class="concluidas-section">
        <div class="concluidas-header">🏆 Tarefas Realizadas Hoje</div>
        <ul id="lista-concluidas" class="concluidas-lista"></ul>
        <div id="resumo-concluidas" class="concluidas-resumo">Total: 0h 0m</div>
        <button id="btn-limpar-concluidas" class="btn-limpar-concluidas">Limpar histórico do dia</button>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
    
    function lerMemoriaSegura(chave, padrao) {
        try { 
            let dado = localStorage.getItem(chave); 
            return dado ? JSON.parse(dado) : padrao; 
        } catch(e) { return padrao; }
    }
    
    function salvarMemoriaSegura(chave, dados) {
        try { localStorage.setItem(chave, JSON.stringify(dados)); } catch(e) {}
    }

    const ui = {
        btnVoz: document.getElementById('btn-voz'),
        txtEntrada: document.getElementById('txt-entrada'),
        btnLimparTexto: document.getElementById('btn-limpar-texto'),
        horaInicio: document.getElementById('hora-inicio'),
        selectCategoria: document.getElementById('select-categoria'),
        containerHistorico: document.getElementById('container-historico'),
        containerRotinas: document.getElementById('container-rotinas'),
        resultadoDiv: document.getElementById('resultado'),
        resumoTopo: document.getElementById('resumo-topo'),
        painelTimer: document.getElementById('painel-timer'),
        btnPausar: document.getElementById('btn-pausar'),
        btnConcluir: document.getElementById('btn-concluir'),
        timerNome: document.getElementById('timer-nome'),
        timerRelogio: document.getElementById('timer-relogio'),
        timerFimEstimado: document.getElementById('timer-fim-estimado'),
        nomeRotina: document.getElementById('nome-rotina'),
        btnSalvarRotina: document.getElementById('btn-salvar-rotina'),
        btnNovaCategoria: document.getElementById('btn-nova-categoria'),
        btnCalcular: document.getElementById('btn-calcular'),
        painelConcluidas: document.getElementById('painel-concluidas'),
        listaConcluidas: document.getElementById('lista-concluidas'),
        resumoConcluidas: document.getElementById('resumo-concluidas'),
        btnLimparConcluidas: document.getElementById('btn-limpar-concluidas')
    };

    function addEv(elemento, evento, funcao) {
        if (elemento) elemento.addEventListener(evento, funcao);
    }

    let tarefasNaMemoria = []; 
    let horarioDeInicio = "11:00";
    let timerInterval;
    let tempoTotalGastoSegundos = 0; 
    let tempoOriginalSegundos = 0;   
    let timerPausado = false;
    let emAtraso = false; 
    let indexTarefaAtiva = -1;
    let momentoPausa = null; 
    let tarefasConcluidasHoje = false; 
    let jaTocouTrofeu = false;

    if (ui.horaInicio) {
        const agoraInit = new Date();
        ui.horaInicio.value = String(agoraInit.getHours()).padStart(2, '0') + ':' + String(agoraInit.getMinutes()).padStart(2, '0');
    }

    addEv(ui.btnLimparTexto, 'click', () => {
        if (ui.txtEntrada) { ui.txtEntrada.value = ''; ui.txtEntrada.focus(); }
    });

    let logDiario = lerMemoriaSegura('logDiarioConcluidas', { data: new Date().toLocaleDateString('pt-BR'), tarefas: [] });
    
    if (logDiario.data !== new Date().toLocaleDateString('pt-BR')) {
        logDiario = { data: new Date().toLocaleDateString('pt-BR'), tarefas: [] };
        salvarMemoriaSegura('logDiarioConcluidas', logDiario);
    }

    function renderizarConcluidas() {
        if (!ui.painelConcluidas || !ui.listaConcluidas || !ui.resumoConcluidas) return;
        
        if (logDiario.tarefas.length === 0) {
            ui.painelConcluidas.style.display = 'none';
            return;
        }

        ui.listaConcluidas.innerHTML = '';
        let totalMinutosDia = 0;

        logDiario.tarefas.forEach(t => {
            totalMinutosDia += t.tempo;
            const li = document.createElement('li');
            li.innerHTML = `<span class="nome-ok">✅ ${t.nome}</span> <span class="tempo-ok">${t.tempo} min</span>`;
            ui.listaConcluidas.appendChild(li);
        });

        const horas = Math.floor(totalMinutosDia / 60);
        const minutes = totalMinutosDia % 60;
        let textoTotal = horas > 0 ? `${horas}h ${minutes}m` : `${minutes}m`;
        
        ui.resumoConcluidas.textContent = `Total investido: ${textoTotal}`;
        ui.painelConcluidas.style.display = 'block';
    }

    addEv(ui.btnLimparConcluidas, 'click', () => {
        if(confirm("Deseja apagar o histórico de tarefas realizadas hoje?")) {
            logDiario.tarefas = [];
            salvarMemoriaSegura('logDiarioConcluidas', logDiario);
            renderizarConcluidas();
        }
    });

    renderizarConcluidas(); 

    const bancoPadraoNumeros = {
        "imposto": 90, "contas": 20, "banho": 15, "barba": 10,
        "louça": 20, "fogão": 15, "micro-ondas": 10, "geladeira": 20, "bancada": 10,
        "passar pano": 10, "pano": 10, "quartos": 15, "varrer": 10, "robô": 10,
        "passar roupa": 45, "dobrar": 20, "estender": 15, "cômoda": 10, "cama": 5, "poltrona": 5, "sofá": 5, "capa": 5,
        "faxina": 40, "box": 20, "janelas": 15, "reciclável": 7, "roupa": 5, "lixo": 5, "plantas": 5,
        "passear": 30, "cantinho": 5, "xixi": 5, "cocô": 3, "água": 2, "ração": 2
    };
    
    let bancoDeTempos = lerMemoriaSegura('meuBancoInteligente', null);
    if (!bancoDeTempos || typeof bancoDeTempos !== 'object' || Array.isArray(bancoDeTempos)) {
        bancoDeTempos = {};
        for (let key in bancoPadraoNumeros) { bancoDeTempos[key] = { historico: [bancoPadraoNumeros[key]], media: bancoPadraoNumeros[key] }; }
    } else {
        for (let key in bancoPadraoNumeros) {
            if (!bancoDeTempos[key] || typeof bancoDeTempos[key] !== 'object') {
                bancoDeTempos[key] = { historico: [bancoPadraoNumeros[key]], media: bancoPadraoNumeros[key] };
            }
        }
    }
    salvarMemoriaSegura('meuBancoInteligente', bancoDeTempos);

    let minhasRotinas = lerMemoriaSegura('minhasRotinasSalvas', {});
    if (typeof minhasRotinas !== 'object' || Array.isArray(minhasRotinas)) minhasRotinas = {};

    const categoriasPadrao = {
        "Casa": [], "Trabalho": [], "Rua": [], "Família": [], 
        "Finanças": [], "Cuidados Pessoais": [], "Transporte": [], "Geral": []
    };
    
    let historicoCategorizado = lerMemoriaSegura('historicoCategorizado', null);
    if (!historicoCategorizado || Array.isArray(historicoCategorizado)) {
        historicoCategorizado = categoriasPadrao;
        let historicoVelho = lerMemoriaSegura('historicoTarefasRecentes', []);
        if (Array.isArray(historicoVelho) && historicoVelho.length > 0) {
            historicoCategorizado["Geral"] = historicoVelho; 
        }
        salvarMemoriaSegura('historicoCategorizado', historicoCategorizado);
    }

    function tocarSintetizadorVitoria() {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return; 
        
        const ctx = new AudioContext();
        const melodia = [
            { f: 659.25, d: 0.4,  t: 0.0 }, 
            { f: 523.25, d: 0.15, t: 0.45 },
            { f: 392.00, d: 0.15, t: 0.65 },
            { f: 523.25, d: 0.15, t: 0.85 },
            { f: 659.25, d: 0.15, t: 1.05 },
            { f: 783.99, d: 0.6,  t: 1.25 },
            { f: 698.46, d: 0.15, t: 1.95 },
            { f: 659.25, d: 0.15, t: 2.15 },
            { f: 587.33, d: 0.15, t: 2.35 },
            { f: 523.25, d: 0.15, t: 2.55 },
            { f: 587.33, d: 0.8,  t: 2.75 } 
        ];

        melodia.forEach(nota => {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            
            osc.type = 'square'; 
            osc.frequency.value = nota.f;
            
            osc.connect(gain);
            gain.connect(ctx.destination);
            
            gain.gain.setValueAtTime(0, ctx.currentTime + nota.t);
            gain.gain.linearRampToValueAtTime(0.15, ctx.currentTime + nota.t + 0.05);
            gain.gain.setValueAtTime(0.15, ctx.currentTime + nota.t + nota.d - 0.05);
            gain.gain.linearRampToValueAtTime(0, ctx.currentTime + nota.t + nota.d);
            
            osc.start(ctx.currentTime + nota.t);
            osc.stop(ctx.currentTime + nota.t + nota.d);
        });
    }

    function carregarSelectCategorias(selecionarAtiva = null) {
        if (!ui.selectCategoria) return;
        ui.selectCategoria.innerHTML = '';
        const categorias = Object.keys(historicoCategorizado);
        
        categorias.forEach(cat => {
            const option = document.createElement('option');
            option.value = cat; option.textContent = cat;
            ui.selectCategoria.appendChild(option);
        });

        if (selecionarAtiva && categorias.includes(selecionarAtiva)) ui.selectCategoria.value = selecionarAtiva;
        else if (categorias.includes("Casa")) ui.selectCategoria.value = "Casa";
        
        renderizarChipsDaCategoria();
    }

    function renderizarChipsDaCategoria() {
        if (!ui.containerHistorico || !ui.selectCategoria) return;
        ui.containerHistorico.innerHTML = '';
        const catAtual = ui.selectCategoria.value;
        const tarefas = historicoCategorizado[catAtual] || [];

        if (tarefas.length === 0) {
            ui.containerHistorico.innerHTML = '<span style="font-size:13px; color:#6b778c;">Nenhuma tarefa nesta lista. Digite e calcule para adicionar!</span>';
            return;
        }

        tarefas.sort((a, b) => a.localeCompare(b, 'pt-BR'));

        tarefas.forEach((tarefaNome, index) => {
            const chip = document.createElement('div'); chip.className = 'tarefa-chip';
            const spanTexto = document.createElement('span');
            spanTexto.textContent = "+ " + tarefaNome;
            spanTexto.onclick = () => {
                if(!ui.txtEntrada) return;
                let atual = ui.txtEntrada.value.trim();
                if (atual === '') ui.txtEntrada.value = tarefaNome;
                else if (atual.endsWith(',')) ui.txtEntrada.value = atual + ' ' + tarefaNome;
                else ui.txtEntrada.value = atual + ', ' + tarefaNome;
            };

            const btnDeletar = document.createElement('button');
            btnDeletar.className = 'btn-del-chip'; btnDeletar.innerHTML = '✖';
            btnDeletar.onclick = (e) => {
                e.stopPropagation(); 
                historicoCategorizado[catAtual].splice(index, 1);
                salvarMemoriaSegura('historicoCategorizado', historicoCategorizado);
                renderizarChipsDaCategoria();
            };

            chip.appendChild(spanTexto); chip.appendChild(btnDeletar); ui.containerHistorico.appendChild(chip);
        });
    }

    addEv(ui.selectCategoria, 'change', renderizarChipsDaCategoria);

    addEv(ui.btnNovaCategoria, 'click', () => {
        let novaCat = prompt("Digite o nome da nova lista (Ex: Compras, Estudos):");
        if(novaCat) {
            novaCat = novaCat.trim();
            if(novaCat && !historicoCategorizado[novaCat]) {
                historicoCategorizado[novaCat] = [];
                salvarMemoriaSegura('historicoCategorizado', historicoCategorizado);
                carregarSelectCategorias(novaCat);
            } else if (historicoCategorizado[novaCat]) {
                if(ui.selectCategoria) ui.selectCategoria.value = novaCat; 
                renderizarChipsDaCategoria();
            }
        }
    });

    carregarSelectCategorias();

    function renderizarRotinas() {
        if(!ui.containerRotinas) return;
        ui.containerRotinas.innerHTML = ''; 
        for (const [nomeRotina, textoRotina] of Object.entries(minhasRotinas)) {
            const pill = document.createElement('div'); pill.className = 'rotina-pill';
            const btnCarregar = document.createElement('button');
            btnCarregar.className = 'btn-carregar-rotina'; btnCarregar.textContent = `▶ ${nomeRotina}`;
            btnCarregar.onclick = () => { 
                if(ui.txtEntrada && ui.btnCalcular) {
                    ui.txtEntrada.value = textoRotina; 
                    ui.btnCalcular.click(); 
                }
            };
            const btnDeletar = document.createElement('button');
            btnDeletar.className = 'btn-del-rotina'; btnDeletar.textContent = '✖';
            btnDeletar.onclick = () => {
                if(confirm(`Excluir a lista "${nomeRotina}"?`)) {
                    delete minhasRotinas[nomeRotina]; salvarMemoriaSegura('minhasRotinasSalvas', minhasRotinas); renderizarRotinas();
                }
            };
            pill.appendChild(btnCarregar); pill.appendChild(btnDeletar); ui.containerRotinas.appendChild(pill);
        }
    }
    
    addEv(ui.btnSalvarRotina, 'click', () => {
        if(!ui.nomeRotina || !ui.txtEntrada) return;
        const nome = ui.nomeRotina.value.trim();
        const textoAtual = ui.txtEntrada.value.trim();
        if (!nome) { alert("Dê um nome para a sua lista antes de salvar!"); return; }
        if (!textoAtual) { alert("A caixa de tarefas está vazia."); return; }
        minhasRotinas[nome] = textoAtual; salvarMemoriaSegura('minhasRotinasSalvas', minhasRotinas);
        ui.nomeRotina.value = ''; renderizarRotinas();
    });
    renderizarRotinas();

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechRecognition) {
        const recognition = new SpeechRecognition();
        recognition.lang = 'pt-BR'; recognition.continuous = true; recognition.interimResults = false;
        
        addEv(ui.btnVoz, 'click', () => {
            if (isRecording) { recognition.stop(); } 
            else { try { recognition.start(); } catch(e) { alert("Erro de microfone."); } }
        });
        recognition.onstart = () => { 
            isRecording = true; 
            if(ui.btnVoz) { ui.btnVoz.classList.add('ouvindo'); ui.btnVoz.textContent = "⏹️ Parar (Ouvindo...)"; }
        };
        recognition.onresult = (event) => {
            let newText = "";
            for (let i = event.resultIndex; i < event.results.length; ++i) { if (event.results[i].isFinal) newText += event.results[i][0].transcript; }
            newText = newText.replace(/[.?!]/g, '').trim();
            if (newText && ui.txtEntrada) {
                const currentText = ui.txtEntrada.value.trim();
                ui.txtEntrada.value = currentText ? currentText + ", " + newText : newText;
            }
        };
        recognition.onerror = (event) => { if (event.error === 'not-allowed') alert("Microfone negado."); };
        recognition.onend = () => { 
            isRecording = false; 
            if(ui.btnVoz) { ui.btnVoz.classList.remove('ouvindo'); ui.btnVoz.textContent = "🎤 Falar Tarefa"; }
        };
    } else { 
        if(ui.btnVoz) { ui.btnVoz.disabled = true; ui.btnVoz.textContent = "Voz não suportada"; }
    }

    addEv(ui.btnCalcular, 'click', () => {
        if(!ui.horaInicio || !ui.txtEntrada) return;
        horarioDeInicio = ui.horaInicio.value;
        const text = ui.txtEntrada.value.toLowerCase();
        if (!horarioDeInicio || !text.trim()) { alert("Digite alguma tarefa primeiro."); return; }

        let rawTasks = text.split(/,\s*|\s+e\s+|\s+depois\s+|\s+em seguida\s+/i);
        tarefasNaMemoria = []; 
        let atualizouBiblioteca = false; 
        tarefasConcluidasHoje = false; 
        jaTocouTrofeu = false;
        
        const categoriaAtiva = ui.selectCategoria ? (ui.selectCategoria.value || "Geral") : "Geral";
        const chavesOrdenadas = Object.keys(bancoDeTempos).sort((a, b) => b.length - a.length);

        rawTasks.forEach(rawTask => {
            let cleanTask = rawTask.trim();
            if (cleanTask.length < 3) return; 

            let explicitTime = null;
            const matchTempo = cleanTask.match(/(.+?)\s+(\d+)$/);
            if (matchTempo) {
                cleanTask = matchTempo[1].trim();
                explicitTime = parseInt(matchTempo[2], 10);
            }

            let taskDuration = 10; 
            let dbKeyExata = cleanTask; 
            let achouNoBanco = false;
            
            for (const palavraChave of chavesOrdenadas) {
                if (cleanTask.includes(palavraChave)) {
                    taskDuration = bancoDeTempos[palavraChave].media;
                    dbKeyExata = palavraChave;
                    achouNoBanco = true;
                    break; 
                }
            }

            if (explicitTime !== null) {
                taskDuration = explicitTime;
                let autoChave = achouNoBanco ? dbKeyExata : cleanTask;
                if (!bancoDeTempos[autoChave]) bancoDeTempos[autoChave] = { historico: [], media: explicitTime };
                
                bancoDeTempos[autoChave].historico.push(explicitTime);
                if (bancoDeTempos[autoChave].historico.length > 5) bancoDeTempos[autoChave].historico.shift();
                
                let soma = 0; bancoDeTempos[autoChave].historico.forEach(val => soma += val);
                bancoDeTempos[autoChave].media = Math.round(soma / bancoDeTempos[autoChave].historico.length);
            } 
            else if (!achouNoBanco) { 
                bancoDeTempos[dbKeyExata] = { historico: [10], media: 10 }; 
            }

            let textoExibicao = cleanTask.replace(/^(a |o |as |os )/i, '');
            let nomeFinal = textoExibicao.charAt(0).toUpperCase() + textoExibicao.slice(1);
            
            let tarefaJaExisteNaBiblioteca = false;
            for (let cat in historicoCategorizado) {
                if (historicoCategorizado[cat].includes(nomeFinal)) {
                    tarefaJaExisteNaBiblioteca = true; break;
                }
            }
            
            if (!tarefaJaExisteNaBiblioteca) {
                if (!historicoCategorizado[categoriaAtiva]) historicoCategorizado[categoriaAtiva] = [];
                historicoCategorizado[categoriaAtiva].push(nomeFinal);
                atualizouBiblioteca = true;
            }
            
            tarefasNaMemoria.push({ name: nomeFinal, duration: taskDuration, dbKey: dbKeyExata });
        });

        if (atualizouBiblioteca) {
            salvarMemoriaSegura('historicoCategorizado', historicoCategorizado);
            renderizarChipsDaCategoria(); 
        }

        if (tarefasNaMemoria.length > 0) desenharTabela();
    });

    window.moverTarefa = function(index, direcao) {
        if (index + direcao < 0 || index + direcao >= tarefasNaMemoria.length) return;
        if (indexTarefaAtiva === index) indexTarefaAtiva = index + direcao;
        else if (indexTarefaAtiva === index + direcao) indexTarefaAtiva = index;

        let temporario = tarefasNaMemoria[index];
        tarefasNaMemoria[index] = tarefasNaMemoria[index + direcao];
        tarefasNaMemoria[index + direcao] = temporario;
        desenharTabela();
    }

    window.excluirTarefa = function(index) {
        if (index === indexTarefaAtiva) pararCronometroTotalmente();
        else if (indexTarefaAtiva > index) indexTarefaAtiva--;
        tarefasNaMemoria.splice(index, 1);
        desenharTabela();
    }

    window.iniciarTarefa = function(index) {
        clearInterval(timerInterval);
        indexTarefaAtiva = index;
        
        tempoOriginalSegundos = tarefasNaMemoria[index].duration * 60;
        tempoTotalGastoSegundos = 0;
        timerPausado = false;
        emAtraso = false;
        momentoPausa = null;
        tarefasConcluidasHoje = true; 
        
        if(ui.painelTimer && ui.timerNome && ui.btnPausar) {
            ui.painelTimer.style.display = 'block';
            ui.painelTimer.classList.remove('timer-atraso'); 
            ui.timerNome.textContent = tarefasNaMemoria[index].name;
            ui.btnPausar.innerHTML = "⏸️ Pausar";
        }
        
        atualizarRelogio();
        timerInterval = setInterval(tickTimer, 1000);
    }

    function tickTimer() {
        if (!timerPausado) {
            tempoTotalGastoSegundos++;
            if (tempoTotalGastoSegundos > tempoOriginalSegundos && !emAtraso) {
                emAtraso = true;
                if(ui.painelTimer) ui.painelTimer.classList.add('timer-atraso');
                alert(`⏰ O tempo previsto para '${tarefasNaMemoria[indexTarefaAtiva].name}' acabou! Contando atraso.`);
            }
            atualizarRelogio();
        }
    }

    function atualizarRelogio() {
        if(!ui.timerRelogio || !ui.timerFimEstimado) return;
        
        let mostrarSegundos = 0; let prefixo = "";
        if (!emAtraso) { mostrarSegundos = tempoOriginalSegundos - tempoTotalGastoSegundos; } 
        else { mostrarSegundos = tempoTotalGastoSegundos - tempoOriginalSegundos; prefixo = "+ "; }

        const min = Math.floor(mostrarSegundos / 60); const seg = mostrarSegundos % 60;
        ui.timerRelogio.textContent = prefixo + String(min).padStart(2, '0') + ":" + String(seg).padStart(2, '0');
        
        let agora = new Date(); let tempoFaltante = (!emAtraso) ? (tempoOriginalSegundos - tempoTotalGastoSegundos) : 0;
        agora.setSeconds(agora.getSeconds() + tempoFaltante);
        
        let horaFim = String(agora.getHours()).padStart(2, '0') + ':' + String(agora.getMinutes()).padStart(2, '0');
        
        if(!emAtraso) ui.timerFimEstimado.innerHTML = `🎯 Término previsto: <span style="font-size: 24px;">${horaFim}</span>`;
        else ui.timerFimEstimado.innerHTML = `⚠️ Tarefa Atrasada`;
    }

    function pararCronometroTotalmente() {
        clearInterval(timerInterval);
        if(ui.painelTimer) {
            ui.painelTimer.style.display = 'none';
            ui.painelTimer.classList.remove('timer-atraso');
        }
        indexTarefaAtiva = -1;
    }

    addEv(ui.btnPausar, 'click', () => {
        timerPausado = !timerPausado;
        if (timerPausado) {
            if(ui.btnPausar) ui.btnPausar.innerHTML = "▶️ Retomar"; 
            momentoPausa = new Date(); 
        } else {
            if(ui.btnPausar) ui.btnPausar.innerHTML = "⏸️ Pausar";
            if (momentoPausa) {
                let atrasoMilisegundos = new Date() - momentoPausa;
                let [h, m] = horarioDeInicio.split(':').map(Number);
                let dataBase = new Date(2000, 0, 1, h, m);
                dataBase.setMilliseconds(dataBase.getMilliseconds() + atrasoMilisegundos);
                
                let newH = String(dataBase.getHours()).padStart(2, '0');
                let newM = String(dataBase.getMinutes()).padStart(2, '0');
                
                horarioDeInicio = `${newH}:${newM}`;
                if(ui.horaInicio) ui.horaInicio.value = horarioDeInicio;
                
                momentoPausa = null; desenharTabela(); 
            }
        }
    });

    addEv(ui.btnConcluir, 'click', () => {
        if (indexTarefaAtiva > -1) {
            let minutesReais = Math.max(1, Math.round(tempoTotalGastoSegundos / 60));
            let tarefaAtual = tarefasNaMemoria[indexTarefaAtiva];
            let chaveDB = tarefaAtual.dbKey;
            
            if (bancoDeTempos[chaveDB]) {
                bancoDeTempos[chaveDB].historico.push(minutesReais);
                if (bancoDeTempos[chaveDB].historico.length > 5) bancoDeTempos[chaveDB].historico.shift();
                
                let soma = 0; bancoDeTempos[chaveDB].historico.forEach(val => soma += val);
                let novaMedia = Math.round(soma / bancoDeTempos[chaveDB].historico.length);
                bancoDeTempos[chaveDB].media = novaMedia;
                salvarMemoriaSegura('meuBancoInteligente', bancoDeTempos);
            }

            logDiario.tarefas.push({ nome: tarefaAtual.name, tempo: minutesReais });
            salvarMemoriaSegura('logDiarioConcluidas', logDiario);
            renderizarConcluidas();

            const agora = new Date();
            const hh = String(agora.getHours()).padStart(2, '0');
            const mm = String(agora.getMinutes()).padStart(2, '0');
            if(ui.horaInicio) ui.horaInicio.value = `${hh}:${mm}`;
            horarioDeInicio = `${hh}:${mm}`;

            let idx = indexTarefaAtiva;
            pararCronometroTotalmente();
            excluirTarefa(idx); 
            
            if (tarefasNaMemoria.length > 0) {
                let proximoIdx = (idx < tarefasNaMemoria.length) ? idx : 0;
                iniciarTarefa(proximoIdx);
            }
        }
    });

    function desenharTabela() {
        if (!ui.resultadoDiv || !ui.resumoTopo) return;
        
        if (tarefasNaMemoria.length === 0) {
            if (tarefasConcluidasHoje) {
                ui.resultadoDiv.innerHTML = `
                    <div class="trofeu-container">
                        <div style="font-size: 60px; margin-bottom: 10px;">🏆</div>
                        <h2 style="color: #ff8b00; margin: 0;">Parabéns!</h2>
                        <p style="color: #42526e; font-size: 16px; margin-top: 5px; font-weight: 600;">Você terminou essa lista de tarefas!</p>
                    </div>
                `;
                ui.resumoTopo.style.display = "none";
                
                if (ui.txtEntrada) { ui.txtEntrada.value = ''; }
                
                if (!jaTocouTrofeu) {
                    tocarSintetizadorVitoria();
                    jaTocouTrofeu = true;
                }

            } else {
                ui.resultadoDiv.innerHTML = "";
                ui.resumoTopo.style.display = "none";
            }
            return;
        }

        let [hours, minutes] = horarioDeInicio.split(':').map(Number);
        let currentTime = new Date(2000, 0, 1, hours, minutes); 
        let totalMinutes = 0;

        let html = `
            <table>
                <thead>
                    <tr>
                        <th>Nº</th>
                        <th>Tarefa</th>
                        <th>Tempo</th>
                        <th>Início</th>
                        <th>Fim</th>
                        <th class="acoes-col">Ações</th>
                    </tr>
                </thead>
                <tbody>
        `;

        tarefasNaMemoria.forEach((task, index) => {
            let startStr = currentTime.toTimeString().substring(0, 5);
            currentTime.setMinutes(currentTime.getMinutes() + task.duration);
            totalMinutes += task.duration;
            let endStr = currentTime.toTimeString().substring(0, 5);

            let rowStyle = (index === indexTarefaAtiva) ? "background-color: #e3fcef;" : "";

            html += `
                <tr style="${rowStyle}">
                    <td>${index + 1}</td>
                    <td>${task.name}</td>
                    <td>${task.duration}m</td>
                    <td>${startStr}</td>
                    <td>${endStr}</td>
                    <td class="acoes-col">
                        <button class="btn-acao" onclick="iniciarTarefa(${index})" title="Play">▶️</button>
                        <button class="btn-acao" onclick="moverTarefa(${index}, -1)">⬆️</button>
                        <button class="btn-acao" onclick="moverTarefa(${index}, 1)">⬇️</button>
                        <button class="btn-acao" onclick="excluirTarefa(${index})">❌</button>
                    </td>
                </tr>
            `;
        });

        html += `</tbody></table>`;

        const totalHours = Math.floor(totalMinutes / 60);
        const remainderMins = totalMinutes % 60;
        const endFinalStr = currentTime.toTimeString().substring(0, 5);
        let tempoTotalTexto = totalHours > 0 ? `${totalHours}h ${remainderMins}m` : `${remainderMins}m`;

        ui.resumoTopo.innerHTML = `
            <p>
                <span>⏳ <strong>Total Restante:</strong></span> 
                <span class="valor-visual val-tempo">${tempoTotalTexto}</span>
            </p>
            <p>
                <span>🏁 <strong>Fim das Tarefas:</strong></span> 
                <span class="valor-visual val-fim">${endFinalStr}</span>
            </p>
        `;
        ui.resumoTopo.style.display = "block";

        ui.resultadoDiv.innerHTML = html;
    }

}); 
</script>

</body>
</html>
